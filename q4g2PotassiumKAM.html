<!DOCTYPE html>
<html>
<head>
<title>Movie Rating</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:url('https://i.pinimg.com/1200x/0d/4a/21/0d4a2124af847f0edc403f63e602e2ea.jpg') no-repeat center center fixed;
background-size:cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
padding:20px;
}

.card{
background:rgba(255,240,246,0.95);
width:500px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
color:#d63384;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:5px;
margin-bottom:15px;
font-family:'Poppins',sans-serif;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ec4899;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#be185d;
}

.star{
font-size:28px;
color:#fcd5e5;
cursor:pointer;
}

.yellow{
color:yellow;
}

.movie{
display:flex;
justify-content:space-between;
align-items:center;
background:#ffe6f0;
padding:12px 15px;
border-radius:8px;
margin-top:10px;
border:1px solid #ffb6d9;
}

.movie-info{
text-align:left;
}

.movie-rating{
font-size:20px;
color:rgb(255, 226, 98);
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

.delete-btn:hover{
background:#b91c1c;
}

</style>
</head>


<body>

<div class="card">

<h2>Add/Update a Movie Rating</h2>

Title:<br>
<input id="title">

Year:<br>
<input id="year">

Genre:<br>
<select id="genre">
<option>Action</option>
<option>Fantasy</option>
<option>Horror</option>
<option>Science Fiction</option>
<option>Drama</option>
<option>Comedy</option>
</select>

Rating:<br>

<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>

<br><br>

<button onclick="addMovie()">Add Movie</button>

<h2>Movie List</h2>

<div id="movieList"></div>

</div>


<script>

let rating = 0;


// STAR CLICK
function setRating(num){

rating = num;

let stars = document.getElementsByClassName("star");

for(let i=0;i<stars.length;i++){
stars[i].classList.remove("yellow");
}

for(let i=0;i<num;i++){
stars[i].classList.add("yellow");
}

}



// CREATE + UPDATE
function addMovie(){

let title=document.getElementById("title").value;
let year=document.getElementById("year").value;
let genre=document.getElementById("genre").value;

if(!title || !year){
alert("Please enter title and year.");
return;
}

let movies=localStorage.getItem("movies");
movies=movies?JSON.parse(movies):[];

let found=false;


// CHECK IF MOVIE EXISTS
for(let i=0;i<movies.length;i++){

if(movies[i].title.toLowerCase()===title.toLowerCase()){

// UPDATE INFORMATION
movies[i].year=year;
movies[i].genre=genre;

// AVERAGE RATING
movies[i].rating=Math.round((movies[i].rating+rating)/2);

found=true;
break;

}

}


// CREATE NEW MOVIE
if(!found){

let movie={
title:title,
year:year,
genre:genre,
rating:rating
};

movies.push(movie);

}


localStorage.setItem("movies",JSON.stringify(movies));

showMovies();
resetForm();

}



// DELETE MOVIE
function deleteMovie(index){

if(confirm("Are you sure you want to delete this movie?")){

let movies=localStorage.getItem("movies");
movies=movies?JSON.parse(movies):[];

movies.splice(index,1);

localStorage.setItem("movies",JSON.stringify(movies));

showMovies();

}

}



// DISPLAY MOVIES
function showMovies(){

let movies=localStorage.getItem("movies");
movies=movies?JSON.parse(movies):[];

let output="";

for(let i=0;i<movies.length;i++){

let stars="★".repeat(movies[i].rating);

output+=`
<div class="movie">

<div class="movie-info">
<p><strong>${movies[i].title}</strong> (${movies[i].year})</p>
<p>${movies[i].genre}</p>
</div>

<div>
<span class="movie-rating">Rating: ${stars}</span>
<button class="delete-btn" onclick="deleteMovie(${i})">Delete</button>
</div>

</div>
`;

}

document.getElementById("movieList").innerHTML=output;

}



// RESET FORM
function resetForm(){

document.getElementById("title").value="";
document.getElementById("year").value="";
rating=0;

let stars=document.getElementsByClassName("star");

for(let i=0;i<stars.length;i++){
stars[i].classList.remove("yellow");
}

}


showMovies();

</script>

</body>
</html>
